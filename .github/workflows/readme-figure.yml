name: README figure

on:
  push:
    branches: [master]
    paths:
      - "README.md"
      - "redwood/**"
      - "scripts/build_readme_figure.py"
      - "examples/datasets/**"
      - "pyproject.toml"
      - ".github/workflows/readme-figure.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-readme-figure:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build README figure
        env:
          MPLCONFIGDIR: /tmp/redwood-matplotlib
        run: python scripts/build_readme_figure.py

      - name: Commit updated figure
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/redwood-grid-light.png docs/assets/redwood-grid-dark.png
          if ! git diff --cached --quiet; then
            git commit -m "Update README example figure"
            git push
          fi
